version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotfeed_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotfeed
    ports:
      - "5432:5432"
    volumes:
      - hotfeed_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotfeed"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hotfeed_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hotfeed_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hotfeed_pg_data:
  hotfeed_redis_data:
